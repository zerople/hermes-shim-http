name: Publish npm package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Validate version metadata
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          package_version = json.loads(Path('package.json').read_text())['version']
          python_version = tomllib.loads(Path('pyproject.toml').read_text())['project']['version']

          init_version = None
          for line in Path('hermes_shim_http/__init__.py').read_text().splitlines():
              if line.startswith('__version__ = '):
                  init_version = line.split('=', 1)[1].strip().strip('"').strip("'")
                  break

          versions = {
              'package.json': package_version,
              'pyproject.toml': python_version,
              'hermes_shim_http/__init__.py': init_version,
          }

          unique_versions = set(versions.values())
          if None in unique_versions or len(unique_versions) != 1:
              raise SystemExit(f'Version mismatch: {versions}')

          ref = os.environ.get('GITHUB_REF', '')
          if ref.startswith('refs/tags/v'):
              tag_version = ref.removeprefix('refs/tags/v')
              if tag_version != package_version:
                  raise SystemExit(
                      f'Tag version v{tag_version} does not match package version {package_version}'
                  )

          print(f'Validated version {package_version}')
          PY
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: npm test
      - name: Launcher smoke test
        run: node bin/hermes-shim-http.js --help
      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public
